<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>SugarTracker V2</title>
<link rel="stylesheet" href="style.css">
</head><body>
<div class="container">
<h1>SugarTracker V2</h1>
<div class="cards">
<div class="card"><h3>Sugar-Free Streak</h3><div id="streak">0</div></div>
<div class="card"><h3>Latest Weight</h3><div id="latestWeight">-</div></div>
<div class="card"><h3>Weekly Exercise</h3><div id="weeklyExercise">0 min</div></div>
</div>

<form id="dietForm">
<h2>Diet</h2>
<input type="date" id="dietDate" required>
<input type="text" id="meal" placeholder="Meal">
<input type="number" id="sugar" placeholder="Sugar (g)" min="0">
<textarea id="dietNotes" placeholder="Notes"></textarea>
<button type="submit">Save Diet</button>
</form>

<form id="exerciseForm">
<h2>Exercise</h2>
<input type="date" id="exerciseDate" required>
<input type="text" id="exerciseType" placeholder="Exercise">
<input type="number" id="minutes" placeholder="Minutes">
<button type="submit">Save Exercise</button>
</form>

<form id="weightForm">
<h2>Weight</h2>
<input type="date" id="weightDate" required>
<input type="number" step="0.1" id="weight" placeholder="Weight (kg)">
<button type="submit">Save Weight</button>
</form>

<h2>History</h2>
<div id="history"></div>
</div>
<script src="script.js"></script>
</body></html>
